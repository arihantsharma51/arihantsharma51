name: Refresh Live Stats

# Runs on a schedule so your profile README's cached images
# (stats card, streak, activity graph) get force-refreshed
# more often than GitHub's default camo cache interval.
# GitHub Actions is the only real way to make a static README
# feel "live" — GitHub does not run JS/React inside a README.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # lets you trigger it manually anytime

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Touch README to bust cache
        run: |
          echo "<!-- last-refreshed: $(date -u) -->" >> README.md

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: refresh live stats timestamp"
          git push
