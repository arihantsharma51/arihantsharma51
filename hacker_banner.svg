<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#001a00"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .col { fill: #00FF41; font-family: 'Courier New', monospace; font-size: 16px; opacity: 0; }
      .flicker { animation: fall 4s linear infinite; }
      @keyframes fall {
        0% { opacity: 0; transform: translateY(-40px); }
        10% { opacity: 1; }
        80% { opacity: 0.8; }
        100% { opacity: 0; transform: translateY(280px); }
      }
      .title {
        fill: #00FF41;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        filter: url(#glow);
      }
      .glitch { animation: glitch 2.5s infinite; }
      @keyframes glitch {
        0%, 92%, 100% { opacity: 1; transform: translate(0,0); }
        93% { opacity: 0.8; transform: translate(-2px,1px); }
        95% { opacity: 0.9; transform: translate(2px,-1px); }
        97% { opacity: 0.7; transform: translate(-1px,0); }
      }
      .scan {
        fill: url(#scanGrad);
        opacity: 0.15;
      }
    </style>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FF41" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bgFade)"/>

  <!-- matrix rain columns -->
  <g>
    <text x="20" y="0" class="col flicker" style="animation-delay:0s">01001</text>
    <text x="60" y="0" class="col flicker" style="animation-delay:0.6s">スキル</text>
    <text x="100" y="0" class="col flicker" style="animation-delay:1.2s">11010</text>
    <text x="140" y="0" class="col flicker" style="animation-delay:0.3s">root</text>
    <text x="180" y="0" class="col flicker" style="animation-delay:1.8s">0xFF</text>
    <text x="220" y="0" class="col flicker" style="animation-delay:0.9s">sudo</text>
    <text x="960" y="0" class="col flicker" style="animation-delay:0.4s">bash$</text>
    <text x="1000" y="0" class="col flicker" style="animation-delay:1.5s">10110</text>
    <text x="1040" y="0" class="col flicker" style="animation-delay:2.1s">exec</text>
    <text x="1080" y="0" class="col flicker" style="animation-delay:0.7s">アクセス</text>
    <text x="1120" y="0" class="col flicker" style="animation-delay:1.3s">0x1A2B</text>
    <text x="1160" y="0" class="col flicker" style="animation-delay:0.2s">kill -9</text>
  </g>

  <!-- scanline -->
  <rect class="scan" x="0" y="0" width="1200" height="300"/>

  <!-- main title -->
  <text x="600" y="130" text-anchor="middle" class="title glitch" font-size="52">ARIHANT SHARMA</text>
  <text x="600" y="170" text-anchor="middle" fill="#00FF41" font-family="Courier New, monospace" font-size="20" opacity="0.85">&gt; root access granted // building the future in silence_</text>
  <text x="600" y="200" text-anchor="middle" fill="#00FF41" font-family="Courier New, monospace" font-size="14" opacity="0.6">[ SYSTEM STATUS: ONLINE ]  [ THREAT LEVEL: FOUNDER ]  [ UPTIME: 24/7 ]</text>

  <!-- border frame -->
  <rect x="4" y="4" width="1192" height="292" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.4"/>
</svg>
